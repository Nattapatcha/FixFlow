services:
  # 1. PHP Application
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: task-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html  # หัวใจของการ Sync: แก้ที่ Local -> เปลี่ยนที่ Container
    networks:
      - task-network

  # 2. Web Server (Nginx)
  nginx:
    image: nginx:alpine
    container_name: task-nginx
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - task-network

  # 3. Database (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: task-db
    environment:
      POSTGRES_DB: task_db
      POSTGRES_USER: sail
      POSTGRES_PASSWORD: password
    volumes:
      - pgdata:/var/lib/postgresql/data # เก็บข้อมูล DB ไว้ถาวรแม้ปิดเครื่อง
    ports:
      - "5432:5432"
    networks:
      - task-network

networks:
  task-network:
    driver: bridge

volumes:
  pgdata: